name: my-node-app deploy on aws

on:
  push:
    branches:
      - main

# 👇 Yeh line poore workflow ke liye Node 24 force kar degi
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: deploy code
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_KEY }}
          script: |
            cd /home/ubuntu/node-app-github-action
            git pull
            docker compose up -d --build
        